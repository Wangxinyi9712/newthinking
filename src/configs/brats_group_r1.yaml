data:
  dataset_name: brats2021
  dim: 3d
  split_file: data_splits/brats_split.json
  spatial_size: [96, 96, 96]
  batch_size: 1
  num_workers: 0
  pin_memory: false
  cache_rate: 0.1
  minority_oversample: true
  minority_oversample_power: 2.0

model:
  in_channels: 4
  out_channels: 1
  channels: [32, 64, 128, 256]
  use_transformer: true

train:
  lr: 1.0e-4
  min_lr: 1.0e-6
  epochs: 200
  ema_momentum: 0.99
  grad_clip: 1.0
  mixup_alpha: 0.4
  seed: [0, 1, 2]
  use_amp: true
  grad_accum_steps: 2

loss:
  tau: 0.7
  lambda_ssl: 1.0
  lambda_minor: 1.0
  lambda_struct: 0.2
  lambda_feat_consistency: 0.1
  temporal_momentum: 0.9
  feature_bank_momentum: 0.95
  hd_weight: 0.5
  fg_weight: 2.0
  topo_weight: 0.2
  focal_alpha: 0.25
  focal_gamma: 2.0
  auto_class_weights: true
  minor_class_weights: [2.0]
  reliability:
    enable_reliability: true
    enable_minority_score: true
    enable_ood: false
    w_conf: 0.35
    w_entropy: 0.25
    w_consistency: 0.25
    w_ood: 0.15
    minority_reliability_boost: 0.3
    fusion_mode: learnable
    fusion_alpha: 0.5

ablation_switches:
  minority_score: true
  ood: false
  consistency: true
  reliability: true

inference:
  use_teacher_ema: true
  threshold: 0.5

log:
  out_dir: runs/brats_group_r1