data:
  dataset_name: brats2021
  dim: 3d
  split_file: data_splits/brats_split.json
  spatial_size: [96, 96, 96]
  batch_size: 1
  num_workers: 0
  pin_memory: false
  cache_rate: 0.1

model:
  in_channels: 4
  out_channels: 1
  channels: [32, 64, 128, 256]
  use_transformer: false

train:
  lr: 1.0e-4
  min_lr: 1.0e-6
  epochs: 200
  ema_momentum: 0.99
  grad_clip: 1.0
  mixup_alpha: 0.0
  seed: [0, 1, 2]
  use_amp: true
  grad_accum_steps: 2

loss:
  tau: 1.1
  lambda_ssl: 0.0
  lambda_minor: 0.0
  lambda_struct: 0.0
  lambda_feat_consistency: 0.0
  temporal_momentum: 0.9
  feature_bank_momentum: 0.95
  hd_weight: 0.5
  fg_weight: 2.0
  topo_weight: 0.0
  focal_alpha: 0.25
  focal_gamma: 2.0
  auto_class_weights: false
  minor_class_weights: [1.0]
  reliability:
    enable_reliability: false
    enable_minority_score: false
    enable_ood: false
    minority_reliability_boost: 0.0
    fusion_mode: multiply
    fusion_alpha: 0.5

ablation_switches:
  minority_score: false
  ood: false
  consistency: false
  reliability: false

inference:
  use_teacher_ema: false
  threshold: 0.5

log:
  out_dir: runs/brats_group_a