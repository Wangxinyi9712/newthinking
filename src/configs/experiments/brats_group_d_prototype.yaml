data:
  dataset_name: brats2023
  dim: 3d
  split_file: data_splits/brats_split.json

  spatial_size: [96, 96, 96]
  crop_size: [96, 96, 96]

  batch_size: 1
  num_workers: 0
  pin_memory: false

  minority_oversample: false
  minority_oversample_power: 1.5

model:
  name: HybridUNet
  in_channels: 4
  out_channels: 1
  channels: [16, 32, 64, 128]
  use_transformer: false

train:
  lr: 0.0001
  min_lr: 0.000001
  epochs: 200
  seed: [0, 1, 2]

  use_amp: true
  grad_clip: 1.0
  ema_momentum: 0.99

  max_train_steps: 0
  max_val_batches: 0
  log_every: 10

loss:
  group_name: D_prototype
  use_unlabeled: true
  use_frequency_filter: false

  lambda_unsup: 0.3
  lambda_spec: 0.0
  lambda_proto: 0.05

inference:
  threshold: 0.5
  use_teacher_ema: true

log:
  out_dir: runs/experiments/brats_group_d_prototype
  ckpt_path: runs/experiments/brats_group_d_prototype/seed_0/best.pt