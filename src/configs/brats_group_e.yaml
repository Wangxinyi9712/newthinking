data:
  dataset_name: brats2021
  dim: 3d
  split_file: data_splits/brats_split.json
  spatial_size: [96, 96, 96]
  batch_size: 1
  num_workers: 0
  pin_memory: false
  cache_rate: 0.1
  minority_oversample: true
  minority_oversample_power: 1.5

model:
  in_channels: 4
  out_channels: 1
  channels: [32, 64, 128, 256]
  use_transformer: true

train:
  lr: 1.0e-4
  min_lr: 1.0e-6
  epochs: 200
  ema_momentum: 0.99
  grad_clip: 1.0
  mixup_alpha: 0.1
  use_amp: true
  grad_accum_steps: 2
  warmup_epochs: 12
  seed: [0]

loss:
  # core
  tau: 0.62
  lambda_ssl: 1.0
  lambda_minor: 0.8
  lambda_struct: 0.08
  lambda_feat_consistency: 0.05

  # CPS + shape-aware
  lambda_cps: 0.30
  lambda_sdm: 0.15

  # adaptive pseudo-label + risk
  teacher_temperature: 1.4
  tau_quantile: 0.65
  soft_gate_power: 0.9
  cvar_ratio: 0.20

  # structural
  hd_weight: 0.25
  fg_weight: 2.0
  topo_weight: 0.08

  # class imbalance
  focal_alpha: 0.25
  focal_gamma: 2.0
  auto_class_weights: false
  minor_class_weights: [2.0]

  # adversarial (robust setting)
  use_adversarial: true
  lambda_adv: 0.02
  lambda_d: 0.5
  d_steps: 1

  reliability:
    enable_reliability: true
    enable_minority_score: true
    enable_ood: true
    w_conf: 0.45
    w_entropy: 0.20
    w_consistency: 0.20
    w_ood: 0.15
    minority_reliability_boost: 0.15
    fusion_mode: convex
    fusion_alpha: 0.80

ablation_switches:
  minority_score: true
  ood: true
  consistency: true
  reliability: true

inference:
  use_teacher_ema: true
  threshold: 0.45  # 建议后续做val sweep: 0.40~0.55

log:
  out_dir: runs/brats_group_e