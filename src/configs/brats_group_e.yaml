data:
  dataset_name: brats2023
  dim: 3d
  split_file: data_splits/brats_split.json

  spatial_size: [96, 96, 96]
  crop_size: [96, 96, 96]

  batch_size: 1
  num_workers: 0
  pin_memory: false

  minority_oversample: false
  minority_oversample_power: 1.5

model:
  in_channels: 4
  out_channels: 1
  channels: [16, 32, 64, 128]
  use_transformer: false

train:
  lr: 0.0001
  min_lr: 0.000001
  epochs: 200
  seed: [0]

  use_amp: true
  grad_clip: 1.0
  ema_momentum: 0.99

loss:
  lambda_unsup: 0.3
  lambda_spec: 0.05
  lambda_proto: 0.05

inference:
  threshold: 0.5
  use_teacher_ema: true

log:
  out_dir: runs/brats_group_e
  ckpt_path: runs/brats_group_e/seed_0/best.pt