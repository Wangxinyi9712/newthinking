data:
  dataset_name: brats2021
  dim: 3d
  split_file: data_splits/brats_split.json
  spatial_size: [96, 96, 96]
  crop_size: [ 96, 96, 96 ]
  batch_size: 1
  num_workers: 2
  pin_memory: false

model:
  in_channels: 4
  out_channels: 1
  channels: [16, 32, 64, 128]

train:
  lr: 1e-4
  epochs: 200
  ema_momentum: 0.99
  amp: true

loss:
  lambda_proto: 0.05
  lambda_spec: 0.1
  lambda_unsup: 1.0
  lambda_sup: 1.0